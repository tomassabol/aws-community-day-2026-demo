type Query {
  getSubmission(id: ID!): Submission
  listSubmissions: [Submission!]!
}

type Mutation {
  createSubmissionDirect(input: CreateSubmissionInput!): Submission!
}

type Submission {
  id: ID!
  title: String!
  speaker: String!
  level: String!
  tags: [String!]!
  pathType: String!
  createdAt: AWSDateTime!
}

input CreateSubmissionInput {
  title: String!
  speaker: String!
  level: String!
  tags: [String!]!
}

schema {
  query: Query
  mutation: Mutation
}
